services:
  c6u-daemon:
    build: .
    image: c6u:latest
    container_name: c6u-daemon
    restart: unless-stopped
    command: ["daemon"]
    volumes:
      - ./data:/data
      - ./config.json:/app/config.json:ro
      - ./aliases.json:/app/aliases.json
      - ./rules.json:/app/rules.json:ro
      - ./automation.json:/app/automation.json:ro
    network_mode: host

  c6u-web:
    image: c6u:latest
    container_name: c6u-web
    restart: unless-stopped
    depends_on: [c6u-daemon]
    command: ["web", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./data:/data
      - ./config.json:/app/config.json:ro
      - ./aliases.json:/app/aliases.json:ro
    ports: ["8000:8000"]

  c6u-metrics:
    image: c6u:latest
    container_name: c6u-metrics
    restart: unless-stopped
    depends_on: [c6u-daemon]
    command: ["metrics", "--port", "9100"]
    volumes:
      - ./config.json:/app/config.json:ro
      - ./aliases.json:/app/aliases.json:ro
    ports: ["9100:9100"]
